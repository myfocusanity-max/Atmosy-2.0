<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f5f5f2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Sky</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0a0a0a; --white: #f5f5f2; --gray: #888; --light-gray: #ddd; }
    html, body { height: 100%; background: var(--white); color: var(--black); font-family: 'DM Mono', monospace; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 600px; margin: 0 auto; }
    #header { padding: clamp(36px,6vh,60px) clamp(20px,5vw,40px) 10px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s; }
    #top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    #location-block { flex: 1; min-width: 0; }
    #location-name { font-family: 'DM Serif Display', serif; font-size: clamp(22px,4vw,32px); letter-spacing: -0.5px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #location-sub { font-size: clamp(9px,1.5vw,12px); color: var(--gray); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
    #clock { font-size: clamp(9px,1.5vw,12px); color: var(--gray); letter-spacing: 1.5px; margin-top: 2px; }
    #hometown-btn { background: none; border: 1px solid var(--light-gray); border-radius: 20px; padding: 6px 12px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.2s ease; margin-top: 4px; }
    #hometown-btn.saved { border-color: var(--black); color: var(--black); }
    #search-wrap { margin-top: 12px; position: relative; }
    #search-input { width: 100%; background: none; border: none; border-bottom: 1px solid var(--light-gray); padding: 8px 32px 8px 0; font-family: 'DM Mono', monospace; font-size: clamp(11px,2vw,14px); letter-spacing: 1px; color: var(--black); outline: none; transition: border-color 0.2s; }
    #search-input::placeholder { color: var(--light-gray); }
    #search-input:focus { border-color: var(--black); }
    #search-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; }
    #icon-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; animation: fadeUp 0.7s ease forwards 0.25s; }
    #weather-icon-wrap { width: clamp(170px,32vw,230px); height: clamp(170px,32vw,230px); display: flex; align-items: center; justify-content: center; }
    #weather-icon-wrap svg { width: 100%; height: 100%; }
    #temp-display { font-family: 'DM Serif Display', serif; font-size: clamp(68px,15vw,108px); letter-spacing: -4px; margin-top: 4px; line-height: 1; }
    #condition-label { font-size: clamp(10px,1.8vw,14px); letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-top: 6px; }
    #feels-row { display: flex; gap: clamp(16px,4vw,40px); margin-top: clamp(14px,3vh,24px); }
    .feels-item { text-align: center; }
    .feels-item .val { font-size: clamp(13px,2.4vw,18px); font-weight: 500; }
    .feels-item .lbl { font-size: clamp(8px,1.3vw,11px); letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-top: 3px; }
    #sunset-section { padding: 0 clamp(20px,5vw,40px) 10px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.4s; }
    #sunset-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gray); margin-bottom: 6px; }
    #sunset-arc-wrap { height: clamp(54px,8vh,72px); width: 100%; }
    #sunset-arc-wrap svg { width: 100%; height: 100%; }
    #sunset-times { display: flex; justify-content: space-between; font-size: clamp(9px,1.5vw,12px); letter-spacing: 1px; color: var(--gray); margin-top: 2px; }
    #forecast-section { border-top: 1px solid var(--light-gray); opacity: 0; animation: fadeUp 0.7s ease forwards 0.55s; }
    #forecast-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gray); padding: 10px clamp(20px,5vw,40px) 6px; }
    .forecast-row { display: flex; align-items: center; padding: clamp(8px,1.5vh,12px) clamp(20px,5vw,40px); border-bottom: 1px solid var(--light-gray); gap: 12px; }
    .forecast-row:last-child { border-bottom: none; }
    .f-day { font-size: clamp(10px,1.6vw,13px); letter-spacing: 1.5px; text-transform: uppercase; width: 38px; flex-shrink: 0; }
    .f-icon { width: clamp(22px,3vw,30px); height: clamp(22px,3vw,30px); flex-shrink: 0; }
    .f-bar-wrap { flex: 1; height: 2px; background: var(--light-gray); border-radius: 2px; overflow: hidden; }
    .f-bar { height: 100%; background: var(--black); border-radius: 2px; transform-origin: left; animation: barGrow 0.8s ease forwards; transform: scaleX(0); }
    .f-temp { font-size: clamp(11px,1.8vw,14px); font-weight: 500; width: 44px; text-align: right; flex-shrink: 0; }
    .f-cond { font-size: clamp(8px,1.2vw,11px); letter-spacing: 1px; text-transform: uppercase; color: var(--gray); width: 64px; text-align: right; flex-shrink: 0; }
    #loading { position: fixed; inset: 0; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s ease; }
    #loading.hide { opacity: 0; pointer-events: none; }
    .load-dot { width: 6px; height: 6px; background: var(--black); border-radius: 50%; display: inline-block; margin: 0 3px; animation: bounce 1.2s infinite; }
    .load-dot:nth-child(2) { animation-delay: 0.2s; }
    .load-dot:nth-child(3) { animation-delay: 0.4s; }
    #load-text { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-top: 16px; }
    #error-msg { display: none; position: fixed; inset: 0; background: var(--white); align-items: center; justify-content: center; flex-direction: column; gap: 12px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); z-index: 99; }
    #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--black); color: var(--white); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: all 0.3s ease; pointer-events: none; white-space: nowrap; z-index: 200; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
    @keyframes barGrow { to{transform:scaleX(1)} }
    @keyframes spinSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes floatCloud { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }
    @keyframes rainFall { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(8px);opacity:0} }
    @keyframes flashBolt { 0%,90%,100%{opacity:1} 92%,98%{opacity:0.1} }
    @keyframes driftFog { 0%,100%{transform:translateX(0);opacity:.8} 50%{transform:translateX(5px);opacity:1} }
    @keyframes windSlide { 0%{transform:translateX(-6px);opacity:0} 30%{opacity:1} 100%{transform:translateX(8px);opacity:0} }
    @keyframes sunPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  </style>
</head>
<body>
<div id="loading">
  <div><span class="load-dot"></span><span class="load-dot"></span><span class="load-dot"></span></div>
  <div id="load-text">Reading the sky</div>
</div>
<div id="error-msg">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="#888"/></svg>
  <span id="error-text">Could not load weather</span>
  <span style="font-size:9px;letter-spacing:1px;">Check connection &amp; allow location</span>
</div>
<div id="toast"></div>
<div id="app">
  <div id="header">
    <div id="top-row">
      <div id="location-block">
        <div id="location-name">—</div>
        <div id="location-sub">—</div>
        <div id="clock">—</div>
      </div>
      <button id="hometown-btn" onclick="toggleHometown()">☆ Hometown</button>
    </div>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="Search any city in India..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="search-btn" onclick="doSearch()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>
  <div id="icon-area">
    <div id="weather-icon-wrap"></div>
    <div id="temp-display">—°</div>
    <div id="condition-label">—</div>
    <div id="feels-row">
      <div class="feels-item"><div class="val" id="feels">—</div><div class="lbl">Feels</div></div>
      <div class="feels-item"><div class="val" id="humidity">—</div><div class="lbl">Humidity</div></div>
      <div class="feels-item"><div class="val" id="wind-speed">—</div><div class="lbl">Wind</div></div>
      <div class="feels-item"><div class="val" id="uv">—</div><div class="lbl">UV</div></div>
    </div>
  </div>
  <div id="sunset-section">
    <div id="sunset-label">Daylight</div>
    <div id="sunset-arc-wrap">
      <svg viewBox="0 0 320 64" fill="none">
        <path d="M 20 58 Q 160 -10 300 58" stroke="#ddd" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
        <path id="arc-progress" d="M 20 58 Q 160 -10 300 58" stroke="#0a0a0a" stroke-width="1.5" fill="none" stroke-dasharray="0 9999"/>
        <circle id="sun-dot" cx="20" cy="58" r="5" fill="#0a0a0a"/>
        <line x1="10" y1="60" x2="310" y2="60" stroke="#ddd" stroke-width="1"/>
      </svg>
    </div>
    <div id="sunset-times">
      <span id="rise-time">—</span>
      <span id="sunset-countdown" style="color:var(--black);font-weight:500;">—</span>
      <span id="set-time">—</span>
    </div>
  </div>
  <div id="forecast-section">
    <div id="forecast-label">Next Few Days</div>
    <div id="forecast-rows"></div>
  </div>
</div>
<script>
const API_KEY='88fb21178fca66f7e0ee1d8bcb88ab63';
const ICONS={
  clear_day:`<svg viewBox="0 0 80 80" fill="none"><g style="animation:sunPulse 3s ease-in-out infinite;transform-origin:40px 40px"><circle cx="40" cy="40" r="14" fill="#0a0a0a"/>${[0,30,60,90,120,150,180,210,240,270,300,330].map(a=>{const r=a*Math.PI/180,x1=40+22*Math.sin(r),y1=40-22*Math.cos(r),x2=40+30*Math.sin(r),y2=40-30*Math.cos(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round"/>`;}).join('')}</g></svg>`,
  clear_night:`<svg viewBox="0 0 80 80" fill="none"><path d="M 50 20 Q 30 28 32 48 Q 34 64 52 66 Q 30 70 20 54 Q 10 36 24 24 Q 34 14 50 20 Z" fill="#0a0a0a"/></svg>`,
  partly_cloudy:`<svg viewBox="0 0 80 80" fill="none"><g style="animation:spinSlow 20s linear infinite;transform-origin:46px 28px"><circle cx="46" cy="28" r="12" fill="#0a0a0a"/>${[0,45,90,135,180,225,270,315].map(a=>{const r=a*Math.PI/180,x1=46+16*Math.sin(r),y1=28-16*Math.cos(r),x2=46+21*Math.sin(r),y2=28-21*Math.cos(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>`;}).join('')}</g><g style="animation:floatCloud 4s ease-in-out infinite"><ellipse cx="30" cy="52" rx="18" ry="12" fill="#0a0a0a"/><ellipse cx="20" cy="56" rx="12" ry="9" fill="#0a0a0a"/><ellipse cx="44" cy="56" rx="12" ry="9" fill="#0a0a0a"/></g></svg>`,
  cloudy:`<svg viewBox="0 0 80 80" fill="none"><g style="animation:floatCloud 5s ease-in-out infinite"><ellipse cx="40" cy="42" rx="24" ry="15" fill="#0a0a0a"/><ellipse cx="26" cy="48" rx="14" ry="11" fill="#0a0a0a"/><ellipse cx="54" cy="48" rx="14" ry="11" fill="#0a0a0a"/><ellipse cx="40" cy="34" rx="14" ry="12" fill="#0a0a0a"/></g></svg>`,
  rain:`<svg viewBox="0 0 80 80" fill="none"><g style="animation:floatCloud 4s ease-in-out infinite"><ellipse cx="40" cy="32" rx="22" ry="13" fill="#0a0a0a"/><ellipse cx="26" cy="38" rx="12" ry="10" fill="#0a0a0a"/><ellipse cx="54" cy="38" rx="12" ry="10" fill="#0a0a0a"/><ellipse cx="40" cy="24" rx="12" ry="10" fill="#0a0a0a"/></g><line x1="28" y1="54" x2="24" y2="64" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" style="animation:rainFall 1s ease-in infinite"/><line x1="40" y1="54" x2="36" y2="64" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" style="animation:rainFall 1s ease-in infinite 0.3s"/><line x1="52" y1="54" x2="48" y2="64" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" style="animation:rainFall 1s ease-in infinite 0.6s"/></svg>`,
  storm:`<svg viewBox="0 0 80 80" fill="none"><g style="animation:floatCloud 3s ease-in-out infinite"><ellipse cx="40" cy="28" rx="24" ry="14" fill="#0a0a0a"/><ellipse cx="26" cy="34" rx="13" ry="10" fill="#0a0a0a"/><ellipse cx="54" cy="34" rx="13" ry="10" fill="#0a0a0a"/><ellipse cx="40" cy="20" rx="13" ry="11" fill="#0a0a0a"/></g><polygon points="44,44 36,58 42,58 38,72 52,52 44,52" fill="#0a0a0a" style="animation:flashBolt 3s ease-in-out infinite"/></svg>`,
  fog:`<svg viewBox="0 0 80 80" fill="none"><line x1="14" y1="30" x2="66" y2="30" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round" style="animation:driftFog 3s ease-in-out infinite"/><line x1="10" y1="42" x2="70" y2="42" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round" style="animation:driftFog 3s ease-in-out infinite 0.5s"/><line x1="18" y1="54" x2="62" y2="54" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round" style="animation:driftFog 3s ease-in-out infinite 1s"/></svg>`,
  wind:`<svg viewBox="0 0 80 80" fill="none"><ellipse cx="20" cy="28" rx="8" ry="6" fill="#0a0a0a" style="animation:floatCloud 4s ease-in-out infinite"/><ellipse cx="14" cy="32" rx="6" ry="5" fill="#0a0a0a"/><ellipse cx="28" cy="32" rx="7" ry="5" fill="#0a0a0a"/><line x1="10" y1="40" x2="66" y2="40" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" style="animation:windSlide 1.8s ease-in-out infinite"/><line x1="10" y1="50" x2="58" y2="50" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" style="animation:windSlide 1.8s ease-in-out infinite 0.3s"/><line x1="10" y1="60" x2="50" y2="60" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" style="animation:windSlide 1.8s ease-in-out infinite 0.6s"/><path d="M60 40 Q68 40 68 48 Q68 56 60 56" stroke="#0a0a0a" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`,
};
function getIconKey(id,isDay){if(id>=200&&id<300)return'storm';if(id>=300&&id<600)return'rain';if(id>=600&&id<700)return'fog';if(id>=700&&id<800)return[771,781].includes(id)?'wind':'fog';if(id===800)return isDay?'clear_day':'clear_night';if(id===801||id===802)return'partly_cloudy';if(id>=803)return'cloudy';return isDay?'clear_day':'clear_night';}
function getLabel(id){if(id>=200&&id<300)return'Thunderstorm';if(id>=300&&id<400)return'Drizzle';if(id>=500&&id<600)return'Rain';if(id>=600&&id<700)return'Snow';if(id===701||id===741)return'Fog';if(id===721)return'Haze';if(id===731||id===761)return'Dust';if(id>=700&&id<800)return'Mist';if(id===800)return'Clear Sky';if(id===801)return'Few Clouds';if(id===802)return'Partly Cloudy';if(id===803)return'Mostly Cloudy';if(id===804)return'Overcast';return'Unknown';}
function smallIcon(id){const key=getIconKey(id,true);const m={clear_day:`<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" fill="#0a0a0a"/>${[0,60,120,180,240,300].map(a=>{const r=a*Math.PI/180,x1=12+6*Math.sin(r),y1=12-6*Math.cos(r),x2=12+8.5*Math.sin(r),y2=12-8.5*Math.cos(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>`;}).join('')}</svg>`,clear_night:`<svg viewBox="0 0 24 24" fill="none"><path d="M15 6Q9 8 10 15Q11 20 16 20Q9 22 6 16Q3 10 8 7Q11 4 15 6Z" fill="#0a0a0a"/></svg>`,partly_cloudy:`<svg viewBox="0 0 24 24" fill="none"><circle cx="15" cy="9" r="4" fill="#0a0a0a"/><ellipse cx="10" cy="16" rx="7" ry="4.5" fill="#0a0a0a"/><ellipse cx="6" cy="17.5" rx="4" ry="3" fill="#0a0a0a"/><ellipse cx="15" cy="17.5" rx="4" ry="3" fill="#0a0a0a"/></svg>`,cloudy:`<svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="14" rx="8" ry="5" fill="#0a0a0a"/><ellipse cx="8" cy="16" rx="5" ry="4" fill="#0a0a0a"/><ellipse cx="16" cy="16" rx="5" ry="4" fill="#0a0a0a"/><ellipse cx="12" cy="11" rx="5" ry="4.5" fill="#0a0a0a"/></svg>`,rain:`<svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="10" rx="7" ry="4.5" fill="#0a0a0a"/><ellipse cx="8" cy="12" rx="4" ry="3.5" fill="#0a0a0a"/><ellipse cx="16" cy="12" rx="4" ry="3.5" fill="#0a0a0a"/><line x1="9" y1="17" x2="8" y2="21" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="17" x2="12" y2="21" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/><line x1="17" y1="17" x2="16" y2="21" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/></svg>`,storm:`<svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="9" rx="7" ry="4.5" fill="#0a0a0a"/><ellipse cx="8" cy="11" rx="4" ry="3.5" fill="#0a0a0a"/><ellipse cx="16" cy="11" rx="4" ry="3.5" fill="#0a0a0a"/><polygon points="13,14 10,19 12.5,19 11,24 16,16 13,16" fill="#0a0a0a"/></svg>`,fog:`<svg viewBox="0 0 24 24" fill="none"><line x1="4" y1="9" x2="20" y2="9" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="13" x2="21" y2="13" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/><line x1="5" y1="17" x2="19" y2="17" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/></svg>`,wind:`<svg viewBox="0 0 24 24" fill="none"><line x1="3" y1="12" x2="19" y2="12" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="16" x2="17" y2="16" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/><path d="M17 12 Q21 12 21 15 Q21 18 17 18" stroke="#0a0a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`};return m[key]||m.cloudy;}
function updateClock(){const t=new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',hour12:true});document.getElementById('clock').textContent=t+'  IST';}
setInterval(updateClock,1000);updateClock();
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
let currentCity=null,currentLat=null,currentLon=null;
function updateHometownBtn(){const saved=localStorage.getItem('hometown_city');const btn=document.getElementById('hometown-btn');if(saved&&currentCity&&saved===currentCity){btn.textContent='★ Hometown';btn.classList.add('saved');}else if(saved){btn.textContent='⌂ '+saved;btn.classList.remove('saved');}else{btn.textContent='☆ Set Hometown';btn.classList.remove('saved');}}
function toggleHometown(){const saved=localStorage.getItem('hometown_city');if(saved&&currentCity&&saved===currentCity){localStorage.removeItem('hometown_city');localStorage.removeItem('hometown_lat');localStorage.removeItem('hometown_lon');showToast('Hometown removed');}else if(currentCity){localStorage.setItem('hometown_city',currentCity);localStorage.setItem('hometown_lat',currentLat);localStorage.setItem('hometown_lon',currentLon);showToast('Hometown saved — '+currentCity);}updateHometownBtn();}
function drawSunsetArc(sunrise,sunset){const now=Date.now()/1000,pct=Math.min(Math.max((now-sunrise)/(sunset-sunrise),0),1);document.getElementById('arc-progress').setAttribute('stroke-dasharray',`${pct*330} 9999`);const t=pct,p0x=20,p0y=58,p1x=160,p1y=-10,p2x=300,p2y=58;document.getElementById('sun-dot').setAttribute('cx',((1-t)*(1-t)*p0x+2*(1-t)*t*p1x+t*t*p2x).toFixed(1));document.getElementById('sun-dot').setAttribute('cy',((1-t)*(1-t)*p0y+2*(1-t)*t*p1y+t*t*p2y).toFixed(1));const fmt=ts=>new Date(ts*1000).toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',hour12:true});document.getElementById('rise-time').textContent=fmt(sunrise);document.getElementById('set-time').textContent=fmt(sunset);const rem=sunset-now;document.getElementById('sunset-countdown').textContent=rem>0?`${Math.floor(rem/3600)}h ${Math.floor((rem%3600)/60)}m to sunset`:'After sunset';}
function renderWeather(cur,fore,lat,lon){currentLat=lat;currentLon=lon;currentCity=cur.name||'Your Location';document.getElementById('location-name').textContent=currentCity;document.getElementById('location-sub').textContent=(cur.sys?.country||'IN')+'  ·  '+lat.toFixed(3)+'°N '+lon.toFixed(3)+'°E';const id=cur.weather[0].id,isDay=cur.dt>cur.sys.sunrise&&cur.dt<cur.sys.sunset;document.getElementById('weather-icon-wrap').innerHTML=ICONS[getIconKey(id,isDay)];document.getElementById('temp-display').textContent=Math.round(cur.main.temp)+'°';document.getElementById('condition-label').textContent=getLabel(id);document.getElementById('feels').textContent=Math.round(cur.main.feels_like)+'°';document.getElementById('humidity').textContent=cur.main.humidity+'%';document.getElementById('wind-speed').textContent=Math.round(cur.wind.speed*3.6)+' km/h';document.getElementById('uv').textContent='—';drawSunsetArc(cur.sys.sunrise,cur.sys.sunset);setInterval(()=>drawSunsetArc(cur.sys.sunrise,cur.sys.sunset),60000);const seen=new Set(),days=[];for(const item of fore.list){const dk=new Date(item.dt*1000).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata',weekday:'short'}).toUpperCase().slice(0,3);if(!seen.has(dk)&&days.length<3){seen.add(dk);days.push({day:dk,id:item.weather[0].id,temp:Math.round(item.main.temp),label:getLabel(item.weather[0].id)});}if(days.length>=3)break;}const maxT=Math.max(...days.map(d=>d.temp)),minT=Math.min(...days.map(d=>d.temp)),range=maxT-minT||1;const rowsEl=document.getElementById('forecast-rows');rowsEl.innerHTML='';days.forEach((d,i)=>{const bp=((d.temp-minT)/range*0.6+0.2).toFixed(2);const row=document.createElement('div');row.className='forecast-row';row.innerHTML=`<div class="f-day">${d.day}</div><div class="f-icon">${smallIcon(d.id)}</div><div class="f-bar-wrap"><div class="f-bar" style="width:${bp*100}%;animation-delay:${0.8+i*0.15}s"></div></div><div class="f-temp">${d.temp}°</div><div class="f-cond">${d.label}</div>`;rowsEl.appendChild(row);});updateHometownBtn();document.getElementById('loading').classList.add('hide');setTimeout(()=>document.getElementById('loading').style.display='none',600);}
async function fetchWeather(lat,lon){const base='https://api.openweathermap.org/data/2.5';const[cur,fore]=await Promise.all([fetch(`${base}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`).then(r=>r.json()),fetch(`${base}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`).then(r=>r.json())]);if(cur.cod!==200)throw new Error(cur.message);renderWeather(cur,fore,lat,lon);}
async function fetchByCity(city){document.getElementById('loading').style.display='flex';document.getElementById('loading').classList.remove('hide');const base='https://api.openweathermap.org/data/2.5';const[cur,fore]=await Promise.all([fetch(`${base}/weather?q=${encodeURIComponent(city)},IN&appid=${API_KEY}&units=metric`).then(r=>r.json()),fetch(`${base}/forecast?q=${encodeURIComponent(city)},IN&appid=${API_KEY}&units=metric`).then(r=>r.json())]);if(cur.cod!==200){showToast('City not found — try another name');document.getElementById('loading').classList.add('hide');return;}renderWeather(cur,fore,cur.coord.lat,cur.coord.lon);}
function doSearch(){const val=document.getElementById('search-input').value.trim();if(!val)return;document.getElementById('search-input').value='';document.getElementById('search-input').blur();fetchByCity(val).catch(()=>showToast('City not found'));}
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
function showError(msg){document.getElementById('loading').style.display='none';const e=document.getElementById('error-msg');e.style.display='flex';document.getElementById('error-text').textContent=msg||'Could not load weather';}
const ht_lat=localStorage.getItem('hometown_lat'),ht_lon=localStorage.getItem('hometown_lon');
if(ht_lat&&ht_lon){fetchWeather(parseFloat(ht_lat),parseFloat(ht_lon)).catch(()=>showError('API error'));}
else if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>fetchWeather(pos.coords.latitude,pos.coords.longitude).catch(()=>showError('API error')),()=>fetchWeather(13.2419,77.7169).catch(()=>showError('API error')),{timeout:8000,enableHighAccuracy:true});}
else{fetchWeather(13.2419,77.7169).catch(()=>showError('API error'));}
</script>
